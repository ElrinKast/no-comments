services:
  kolink:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install --omit=dev && npm start"
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      TURN_URL: "${TURN_URL:-}"
      TURN_USER: "${TURN_USER:-}"
      TURN_PASSWORD: "${TURN_PASSWORD:-}"
      EMAIL_VERIFICATION_ENABLED: "${EMAIL_VERIFICATION_ENABLED:-false}"
      EMAIL_CODE_SECRET: "${EMAIL_CODE_SECRET:-}"
      SMTP_HOST: "${SMTP_HOST:-}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_SECURE: "${SMTP_SECURE:-false}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASSWORD: "${SMTP_PASSWORD:-}"
      SMTP_FROM: "${SMTP_FROM:-Kolink <noreply@kolink.ru>}"
    volumes:
      - ./:/app
    restart: unless-stopped

  turn:
    image: coturn/coturn:4.6
    network_mode: host
    command:
      - -n
      - --log-file=stdout
      - --fingerprint
      - --lt-cred-mech
      - --user=${TURN_USER:-kolink}:${TURN_PASSWORD:-change-me}
      - --realm=${TURN_REALM:-kolink.local}
      - --external-ip=${TURN_EXTERNAL_IP:-127.0.0.1}
      - --min-port=${TURN_MIN_PORT:-49160}
      - --max-port=${TURN_MAX_PORT:-49200}
      - --no-tcp
      - --no-tcp-relay
      - --no-tls
      - --no-dtls
      - --no-cli
    restart: unless-stopped
